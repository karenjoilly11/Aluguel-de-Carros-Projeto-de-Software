#
# application.yml — Configuração do Micronaut
#

micronaut:
  application:
    name: aluguel-carros
  server:
    port: 8082
    cors:
      enabled: true
      configurations:
        web:
          allowed-origins:
            - http://localhost:8082
          allowed-methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          allowed-headers:
            - Content-Type
            - Accept

  router:
    static-resources:
      default:
        paths: classpath:public
        mapping: /**
        enabled: true

# ── Banco de Dados — PostgreSQL ───────────────────────────────────────
# Ajuste "username" e "password" conforme sua instalação do EDB Postgres.
# O banco "aluguelcarros" precisa ser criado antes de rodar:
#   CREATE DATABASE aluguelcarros;
datasources:
  default:
    url: jdbc:postgresql://localhost:5432/aluguelcarros
    driverClassName: org.postgresql.Driver
    username: postgres
    password: 12345
    dialect: POSTGRES

# ── JPA / Hibernate ──────────────────────────────────────────────────
jpa:
  default:
    properties:
      hibernate:
        hbm2ddl:
          auto: update   # "update" cria/atualiza tabelas sem apagar dados
        show_sql: true
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
