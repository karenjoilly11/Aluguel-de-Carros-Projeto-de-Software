#
# application.yml — Configuração do Micronaut
#

micronaut:
  application:
    name: aluguel-carros
  server:
    port: 8082

  # ── Segurança JWT ─────────────────────────────────────────────────
  security:
    enabled: true
    authentication: bearer
    token:
      jwt:
        signatures:
          secret:
            generator:
              secret: "${JWT_SECRET:DriveEliteSecretKey2024XYZ987654321ABCDEF0123}"
              jws-algorithm: HS256
        generator:
          access-token:
            expiration: 86400

    intercept-url-map:
      - pattern: /auth/**
        access:
          - isAnonymous()
      - pattern: /clientes/**
        access:
          - isAuthenticated()

  cors:
    enabled: true
    configurations:
      web:
        # Cobre qualquer porta que o Vite escolher (3000–3010)
        allowed-origins-regex:
          - "http://localhost:[0-9]+"
        allowed-methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        allowed-headers:
          - Content-Type
          - Accept
          - Authorization
        exposed-headers:
          - Authorization

# ── Banco de Dados — PostgreSQL ───────────────────────────────────────
datasources:
  default:
    url: "${DB_URL:jdbc:postgresql://localhost:5432/aluguelcarros}"
    driverClassName: org.postgresql.Driver
    username: "${DB_USERNAME:postgres}"
    password: "${DB_PASSWORD:12345}"
    dialect: POSTGRES

# ── JPA / Hibernate ──────────────────────────────────────────────────
jpa:
  default:
    properties:
      hibernate:
        hbm2ddl:
          auto: update
        show_sql: false
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
